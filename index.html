<!DOCTYPE HTML>
<html lang="fr">
<head>
    <title>Play2Earn VIP | Online Gaming Rewards</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0f13; font-family: 'Inter', sans-serif; color: white; padding-top: 140px; }

        /* الهيدر المصلح بالكامل */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: #16191e; border-bottom: 2px solid #2d333b;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 1000;
        }
        
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-section img { height: 70px; width: auto; object-fit: contain; }
        .logo-section h1 { font-size: 24px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .logo-section h1 span { color: #00ff85; }

        .header-info { text-align: right; }
        .paid-total { font-size: 14px; font-weight: 700; margin-bottom: 5px; color: #9299a4; }
        .paid-total b { color: #fca311; }
        .online-badge { color: #00ff85; font-size: 12px; font-weight: 900; background: rgba(0,255,133,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid #00ff85; display: inline-block; }

        /* شريط السحوبات */
        .ticker-bar {
            position: fixed; top: 90px; left: 0; width: 100%; height: 40px;
            background: #1c2128; border-bottom: 1px solid #2d333b;
            display: flex; align-items: center; overflow: hidden; z-index: 999;
        }
        .ticker-content { display: flex; animation: slide 40s linear infinite; }
        .ticker-item { margin-right: 50px; font-weight: 800; font-size: 13px; color: #fff; white-space: nowrap; }
        .ticker-item span { color: #00ff85; }
        @keyframes slide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* محتوى الموقع */
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }

        .game-card { background: #16191e; border-radius: 15px; border: 2px solid #2d333b; padding: 15px; text-align: center; transition: 0.3s; }
        .game-card:hover { border-color: #00ff85; transform: scale(1.02); }
        .game-card img { width: 100%; height: 180px; border-radius: 10px; object-fit: cover; margin-bottom: 15px; }
        .game-card .reward-tag { color: #00ff85; font-weight: 900; font-size: 12px; display: block; margin-bottom: 8px; }
        .game-card h3 { font-size: 16px; margin-bottom: 15px; color: #eee; }
        .play-btn { background: #00ff85; color: #000; text-decoration: none; display: block; padding: 12px; border-radius: 8px; font-weight: 900; text-transform: uppercase; font-size: 13px; }

        /* قسم الشركات */
        .partners { margin-top: 60px; border-top: 1px solid #2d333b; padding-top: 30px; }
        .partners h2 { color: #fca311; font-size: 20px; font-weight: 900; margin-bottom: 20px; }
        .partners-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .p-card { background: #1a1d23; border: 1px solid #2d333b; padding: 15px; border-radius: 12px; text-align: center; position: relative; }
        .p-card img { height: 40px; margin-bottom: 10px; }
        .p-card .bonus-label { position: absolute; top: 10px; right: 10px; background: #00ff85; color: #000; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <img src="logo.png" alt="Play2Earn VIP"> 
            <h1>PLAY2EARN <span>VIP</span></h1>
