<!DOCTYPE HTML>
<html lang="fr">
<head>
    <title>Play2Earn VIP</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0f13; font-family: 'Inter', sans-serif; color: white; padding-top: 120px; }

        /* الهيدر الرئيسي - معالجة الهوامش والمربع الفارغ */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background: #16191e; border-bottom: 2px solid #2d333b;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 1000;
        }

        .logo-area img { height: 50px; display: block; }

        .nav-menu { display: flex; gap: 30px; list-style: none; }
        .nav-menu li { font-weight: 900; font-size: 16px; cursor: pointer; color: #9299a4; transition: 0.3s; }
        .nav-menu li.active { color: #00ff85; border-bottom: 3px solid #00ff85; padding-bottom: 5px; }

        .header-right { text-align: right; }
        .stats-top { font-size: 14px; font-weight: 700; color: #ffffff; margin-bottom: 5px; }
        .stats-top span { color: #00ff85; font-size: 18px; }

        /* شريط السحوبات - معالجة الخط الرقيق */
        .payouts-bar {
            position: fixed; top: 80px; left: 0; width: 100%; height: 40px;
            background: #1c2128; border-bottom: 1px solid #2d333b;
            display: flex; align-items: center; overflow: hidden; z-index: 999;
        }
        .ticker { display: flex; animation: slide 20s linear infinite; white-space: nowrap; }
        .ticker-item { margin-right: 60px; font-weight: 900; font-size: 14px; color: #fff; text-transform: uppercase; }
        .ticker-item b { color: #00ff85; margin-left: 5px; }

        @keyframes slide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* شبكة العروض - المربعات */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: #16191e; border-radius: 15px; border: 1px solid #2d333b; padding: 15px; text-align: center; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .card h3 { font-size: 18px; margin-bottom: 10px; }
        .card .price { color: #00ff85; font-size: 22px; font-weight: 900; display: block; margin-bottom: 15px; }
        .btn { background: #00ff85; color: #000; text-decoration: none; padding: 12px 0; display: block; border-radius: 8px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="images/logo-removebg-preview.png" alt="Play2Earn VIP">
        </div>
        <ul class="nav-menu">
            <li class="active">Gagner</li>
            <li>Cashout</li>
            <li>Récompenses</li>
        </ul>
        <div class="header-right">
            <div class="stats-top">Est. 2017 | Paid: <span>$3,510,240</span></div>
        </div>
    </header>

    <div class="payouts-bar">
        <div class="ticker">
            <div class="ticker-item">User_2291: <b>$25.00 PAYPAL</b></div>
            <div class="ticker-item">Arbi_XX: <b>$14.20 LTC</b></div>
            <div class="ticker-item">King_Gamer: <b>$50.00 VISA</b></div>
            <div class="ticker-item">Momo_Earn: <b>$10.00 PAYPAL</b></div>
        </div>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <img src="images/1.png">
                <h3>Merge Help-Warm Family</h3>
                <span class="price">$23.22</span>
                <a href="#" class="btn">Jouer et gagne</a>
            </div>
            <div class="card">
                <img src="images/2.png">
                <h3>Monopoly Go!</h3>
                <span class="price">$45.00</span>
                <a href="#" class="btn">Jouer et gagne</a>
            </div>
            <div class="card">
                <img src="images/3.png">
                <h3>Triple Tile Match</h3>
                <span class="price">$12.50</span>
                <a href="#" class="btn">Jouer et gagne</a>
            </div>
        </div>
    </div>

</body>
</html>
