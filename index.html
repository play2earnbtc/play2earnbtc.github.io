<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2E Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="landing-page" class="active">
        <header>
            <div class="logo">P2E Rewards</div>
            <div class="auth-buttons">
                <button class="btn-signin">SIGN IN</button>
                <button class="btn-signup-top">SIGN UP FOR FREE</button>
            </div>
        </header>

        <section class="hero-section">
            <div class="main-content">
                <h1>REALITY REWARDS:<br><span>TURN GAMING INTO REAL CASH!</span></h1>
                <p>PLAY TOP MOBILE GAMES & EARN UP TO $500 PER GAME</p>
                
                <div class="content-wrapper">
                    <div class="grid-container">
                        <div class="offer-card">MYSTERY GAME <span class="price">$250</span></div>
                        <div class="offer-card">ULTIMATE CHALLENGE <span class="price">$500</span></div>
                        <div class="offer-card">SPEED RUN <span class="price">$100</span></div>
                        <div class="offer-card">SPEED RUN <span class="price">$100</span></div>
                        <div class="offer-card">SHOMFIGHT Y <span class="price">$200</span></div>
                        <div class="offer-card">POY HAIR <span class="price">$100</span></div>
                    </div>
                    
                    <div class="phone-area">
                        <img src="https://www.pngarts.com/files/8/Apple-iPhone-12-PNG-Image.png" class="phone-img">
                        <button class="big-signup-btn">SIGN UP</button>
                    </div>
                </div>

                <div class="payout-bar">
                    <span>PAYOUT METHODS:</span>
                    <div class="payout-icons">
                        <div class="pay-box">PAYPAL</div>
                        <div class="pay-box">BITCOIN</div>
                        <div class="pay-box">GIFT CARDS</div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
