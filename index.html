<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P2E Rewards</title>
    <style>
        body { background-color: #0a0e17; color: white; font-family: sans-serif; margin: 0; }
        .container { display: grid; grid-template-columns: 300px 1fr 400px; gap: 20px; padding: 40px; align-items: center; }
        
        /* رقم 1: منطقة التسجيل */
        .login-box { background: #161c2d; padding: 20px; border-radius: 10px; border: 1px solid #2a3447; }
        .login-box input { width: 100%; margin-bottom: 10px; padding: 10px; background: #0d121f; border: 1px solid #2a3447; color: white; }
        
        /* الوسط: النصوص */
        .text-center { text-align: center; }
        h1 span { color: #00ff85; }

        /* رقم 2: منطقة صورة الخزنة */
        .safe-zone { text-align: center; position: relative; }
        .safe-image { width: 100%; max-width: 400px; }
        .btn-signup { background: #ff7a00; border: none; color: white; padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: -50px; position: relative; }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-box">
            <h2 style="color:#ff7a00">SIGN IN</h2>
            <input type="text" placeholder="Email">
            <input type="password" placeholder="Password">
            <button style="width:100%; background:#ff7a00; border:none; padding:10px; color:white; font-weight:bold;">LOGIN</button>
        </div>

        <div class="text-center">
            <h1>REALITY REWARDS:<br><span>TURN GAMING INTO CASH!</span></h1>
        </div>

        <div class="safe-zone">
            <img src="ضع_رابط_صورة_الخزنة_هنا" class="safe-image" alt="Safe and Money">
            <button class="btn-signup">SIGN UP NOW</button>
        </div>
    </div>

</body>
</html>
