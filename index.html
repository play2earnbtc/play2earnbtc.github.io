<!DOCTYPE HTML>
<html lang="fr">
<head>
    <title>Play2Earn VIP | 24 Games & Partners</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0f13; font-family: 'Arial', sans-serif; color: white; padding-top: 150px; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 100px; background: #16191e; border-bottom: 3px solid #2d333b; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 1000; }
        .mario-logo { font-family: 'Press Start 2P', cursive; font-size: 16px; display: flex; gap: 4px; }
        .mario-logo span { color: #ff0000; text-shadow: 2px 2px #000; }
        .mario-logo .vip-text { color: #00ff85 !important; margin-left: 10px; }
        .ssl-badge { background: rgba(0, 255, 133, 0.1); border: 1px solid #00ff85; padding: 8px 15px; border-radius: 8px; color: #00ff85; font-size: 11px; display: flex; align-items: center; gap: 8px; }
        .container { max-width: 1450px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .game-card { background: #16191e; border: 2px solid #2d333b; border-radius: 12px; padding: 15px; text-align: center; }
        .game-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; }
        .reward-tag { color: #fca311; font-weight: 900; display: block; margin-bottom: 10px; }
        .play-btn { background: #00ff85; color: #000; text-decoration: none; display: block; padding: 12px; border-radius: 8px; font-weight: 900; text-transform: uppercase; }
        .ads-banner { grid-column: span 4; background: #1a1d23; border: 2px dashed #3d444d; min-height: 90px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .partners-title { color: #fca311; margin: 50px 0 20px; font-size: 22px; font-weight: 900; border-left: 4px solid #fca311; padding-left: 15px; }
        .partners-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 50px; }
        .partner-box { background: #1a1d23; border: 1px solid #2d333b; border-radius: 10px; padding: 20px; text-align: center; text-decoration: none; color: white; display: block; }
        .partner-box img { height: 40px; margin-bottom: 10px; opacity: 0.8; }
        @media (max-width: 1000px) { .grid, .partners-grid { grid-template-columns: repeat(2, 1fr); } .ads-banner { grid-column: span 2; } }
    </style>
</head>
<body>

    <header>
        <div class="mario-logo"><span>PLAY2EARN</span><span class="vip-text">VIP</span></div>
        <div class="ssl-badge"><i class="fas fa-shield-alt"></i> SSL SECURED</div>
        <div style="text-align:right">
            <div style="color:#fca311; font-weight:900;">Total Paid: $3,510,240</div>
            <span style="color:#00ff85; font-size:10px;">● 3,124 Online</span>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- أول 8 خانات -->
            <script>
                for(let i=1; i<=8; i++) {
                    document.write(`
                    <div class="game-card">
                        <img src="الصق_رابط_صورة_اللعبة_${i}_هنا">
                        <span class="reward-tag">الصق_قيمة_الربح_${i}_هنا</span>
                        <h3>الصق_اسم_اللعبة_${i}_هنا</h3>
                        <a href="الصق_رابط_قفل_اللعبة_${i}_هنا" class="play-btn">Jouer et gagne</a>
                    </div>`);
                }
            </script>

            <div class="ads-banner">الصق_كود_الإعلان_الأول_هنا</div>

            <!-- ثاني 8 خانات (9-16) -->
            <script>
                for(let i=9; i<=16; i++) {
                    document.write(`
                    <div class="game-card">
                        <img src="الصق_رابط_صورة_اللعبة_${i}_هنا">
                        <span class="reward-tag">الصق_قيمة_الربح_${i}_هنا</span>
                        <h3>الصق_اسم_اللعبة_${i}_هنا</h3>
                        <a href="الصق_رابط_قفل_اللعبة_${i}_هنا" class="play-btn">Jouer et gagne</a>
                    </div>`);
                }
            </script>

            <div class="ads-banner">الصق_كود_الإعلان_الثاني_هنا</div>

            <!-- ثالث 8 خانات (17-24) -->
            <script>
                for(let i=17; i<=24; i++) {
                    document.write(`
                    <div class="game-card">
                        <img src="الصق_رابط_صورة_اللعبة_${i}_هنا">
                        <span class="reward-tag">الصق_قيمة_الربح_${i}_هنا</span>
                        <h3>الصق_اسم_اللعبة_${i}_هنا</h3>
                        <a href="الصق_رابط_قفل_اللعبة_${i}_هنا" class="play-btn">Jouer et gagne</a>
                    </div>`);
                }
            </script>
        </div>

        <!-- خانات شركات الإحالة الـ 10 -->
        <h2 class="partners-title">OFFERWALL PARTNERS</h2>
        <div class="partners-grid">
            <script>
                const partners = ["AdGate", "AyetStudios", "Torox", "MM Wall", "RevU", "TimeWall", "BitLabs", "MyChips", "Lootably", "Adjoe"];
                partners.forEach((name, index) => {
                    document.write(`
                    <a href="الصق_رابط_شركة_${name}_هنا" class="partner-box">
                        <img src="الصق_رابط_لوغو_شركة_${name}_هنا">
                        <p>${name}</p>
                    </a>`);
                });
            </script>
        </div>
    </div>
</body>
</html>
