<!DOCTYPE HTML>
<html lang="fr">
<head>
    <title>Play2Earn VIP - Final Functional Build</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #049CD8;
            --mario-yellow: #FBD000;
            --mario-green: #2ecc71;
            --bg-dark: #05070a;
            --card-bg: #111418;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); font-family: 'Segoe UI', Arial, sans-serif; color: white; }

        header { 
            background: #000; padding: 15px 50px; border-bottom: 2px solid #222;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; width: 100%; z-index: 10000;
        }
        
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .logo .c1 { color: var(--mario-red); }
        .logo .c2 { color: var(--mario-blue); }
        .logo .c3 { color: var(--mario-yellow); }
        .logo .c4 { color: var(--mario-green); }
        .logo .c5 { color: var(--mario-red); margin-left: 5px; }
        .logo .c6 { color: var(--mario-blue); }
        .logo .c7 { color: var(--mario-yellow); }
        .logo .c8 { color: var(--mario-green); }
        .logo .c9 { color: var(--mario-red); }
        .logo .vip-text { color: white; margin-left: 4px; }

        .ticker-wrap { width: 100%; background: #111; margin-top: 65px; overflow: hidden; border-bottom: 1px solid #222; padding: 12px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: scroll 35s linear infinite; color: #999; font-size: 12px; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }

        .game-card { background: var(--card-bg); border: 1px solid #1f242b; border-radius: 8px; padding: 25px; text-align: center; }
        .reward { color: var(--mario-yellow); font-weight: bold; font-size: 20px; display: block; }
        
        .play-button { 
            background: var(--mario-green); color: #000; text-decoration: none; 
            display: block; padding: 14px; border-radius: 4px; font-weight: 800; font-size: 14px;
            text-transform: uppercase; margin-top: 15px;
        }

        /* إصلاح قسم الشركات ليعمل كروابط */
        .partners-section { margin-top: 60px; text-align: center; padding-bottom: 50px; }
        .partners-title { color: var(--mario-blue); font-size: 14px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        .partners-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        
        .partner-link { 
            display: block; background: #111; border: 1px solid #222; padding: 15px; 
            border-radius: 4px; color: #555; font-size: 11px; font-weight: bold; 
            text-decoration: none; transition: 0.3s;
        }
        .partner-link:hover { border-color: var(--mario-blue); color: white; background: #1a1a1a; }

        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } .partners-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>

            <span class="c1">P</span><span class="c2">L</span><span class="c3">A</span><span class="c4">Y</span>

</body>
</html>
