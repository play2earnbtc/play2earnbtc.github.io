<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reality Rewards - Production Build</title>
    <style>
        :root {
            --orange: #ff7a00;
            --green: #00ff85;
            --dark-bg: #0b0f1a;
            --card-bg: #161c2d;
            --input-bg: #0d121f;
            --border: #2a3447;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* الحاوية الرئيسية مقسمة لـ 3 أعمدة ثابتة كما في المخطط */
        .layout-grid {
            display: grid;
            grid-template-columns: 320px 1fr 340px;
            gap: 30px;
            width: 95%;
            max-width: 1400px;
            align-items: center;
        }

        /* --- 1. قسم تسجيل الدخول (اليسار) --- */
        .login-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .login-section h2 {
            color: var(--orange);
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.6rem;
            text-transform: uppercase;
        }

        .input-group {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #ff8c00, #ff4e00);
            border: none;
            color: white;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 78, 0, 0.3);
        }

        /* --- الوسط: شبكة العروض --- */
        .offers-section {
            text-align: center;
        }

        .offers-section h1 {
            font-size: 2.6rem;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .offers-section h1 span { color: var(--green); }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .offer-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            transition: 0.3s;
        }

        .offer-card:hover { border-color: var(--green); transform: translateY(-5px); }

        .offer-card .reward-value {
            display: block;
            color: var(--green);
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 5px;
        }

        /* --- 2. قسم الجذب والاشتراك (اليمين) --- */
        .cta-section {
            text-align: center;
        }

        .visual-asset {
            width: 100%;
            max-width: 350px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
        }

        .btn-main-signup {
            width: 100%;
            padding: 20px;
            background: linear-gradient(180deg, #ff9d00, #ff4500);
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.4);
        }

        /*Responsive*/
        @media (max-width: 1100px) {
            .layout-grid { grid-template-columns: 1fr; }
            .login-section { order: 2; width: 100%; max-width: 400px; margin: 0 auto; }
            .offers-section { order: 1; }
            .cta-section { order: 3; }
        }
    </style>
</head>
<body>

    <div class="layout-grid">
        
        <div class="login-section">
            <h2>SIGN IN</h2>
            <input type="text" class="input-group" placeholder="Username or Email">
            <input type="password" class="input-group" placeholder="Password">
            <button class="btn-login">LOGIN</button>
            <p style="font-size: 0.85rem; text-align: center; color: #8892b0; margin-top: 15px;">
                Don't have an account? <span style="color: var(--orange); cursor: pointer;">Register</span>
            </p>
        </div>

        <div class="offers-section">
            <h1>REALITY REWARDS:<br><span>TURN GAMING INTO CASH!</span></h1>
            <div class="offers-grid">
                <div class="offer-card">
                    <div style="font-size: 0.85rem; color: #8892b0;">MYSTERY GAME</div>
                    <span class="reward-value">$250</span>
                </div>
                <div class="offer-card">
                    <div style="font-size: 0.85rem; color: #8892b0;">ULTIMATE CHALLENGE</div>
                    <span class="reward-value">$500</span>
                </div>
                <div class="offer-card">
                    <div style="font-size: 0.85rem; color: #8892b0;">CRYPTO SURGE</div>
                    <span class="reward-value">$150</span>
                </div>
                <div class="offer-card">
                    <div style="font-size: 0.85rem; color: #8892b0;">DAILY LOGIN</div>
                    <span class="reward-value">$100</span>
                </div>
            </div>
        </div>

        <div class="cta-section">
            <img src="https://i.imgur.com/your_safe_image.png" class="visual-asset" alt="Safe & Cash">
            <button class="btn-main-signup">SIGN UP NOW</button>
        </div>

    </div>

</body>
</html>
