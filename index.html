<!DOCTYPE HTML>
<html>
	<head>
		<title>Choose Your Game</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			body { background: #000; padding: 20px; font-family: sans-serif; }
			.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
			.game-card { background: #111; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; transition: 0.3s; }
			.game-card:hover { border-color: #00ff85; transform: scale(1.05); }
			.game-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
			.price { color: #00ff85; font-weight: bold; display: block; margin-top: 10px; font-size: 1.2rem; }
			h1 { color: #fff; text-align: center; margin-bottom: 40px; }
		</style>
	</head>
	<body>
		<h1>SELECT A GAME TO CLAIM YOUR $500</h1>
		<div class="grid-container">
			<script>
				const cpaLink = "ضع_رابط_CPA_هنا"; 
				for (let i = 1; i <= 20; i++) {
					document.write(`
						<div class="game-card">
							<a href="${cpaLink}">
								<img src="images/${i}.png" onerror="this.src='https://via.placeholder.com/180?text=Game+${i}'">
							</a>
							<span class="price">$500 REWARD</span>
						</div>
					`);
				}
			</script>
		</div>
	</body>
</html>
