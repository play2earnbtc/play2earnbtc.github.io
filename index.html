<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Rewards - Play & Earn</title>
    <style>
        :root {
            --primary-orange: #fd7e14;
            --success-green: #28a745;
            --bg-dark: #0a0e17;
            --card-bg: #161c2d;
            --text-muted: #6c757d;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            line-height: 1.5;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(0,0,0,0.2);
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #fff; text-transform: uppercase; }
        .auth-btns { display: flex; gap: 10px; align-items: center; }
        .auth-btns button {
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        .auth-btns button:hover { opacity: 0.8; }
        .btn-login { background: transparent; color: #fff; }
        .btn-signup-top { background: var(--primary-orange); color: #fff; }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; }
        h1 span { color: var(--success-green); }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; }

        /* Main Container: Grid + Phone */
        .main-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap; /* responsive */
        }

        /* Offers Grid (3x2) */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(3, 190px);
            gap: 15px;
        }
        .offer-card {
            background: var(--card-bg);
            border: 1px solid #232b3e;
            border-radius: 12px;
            padding: 20px 10px;
            transition: transform 0.2s, border-color 0.2s;
            text-align: center;
        }
        .offer-card:hover { transform: translateY(-5px); border-color: var(--success-green); }
        
        /* Game Icons (UPDATED) */
        .card-icon {
            width: 80px; /* Increased width */
            height: 80px; /* Increased height */
            margin: 0 auto 15px auto;
            display: block;
            border-radius: 12px; /* Smoother border */
            object-fit: cover;
            border: 2px solid transparent; /* Prepare for hover effect */
            transition: border-color 0.2s;
        }
        .offer-card:hover .card-icon {
            border-color: var(--success-green); /* Hover border on icon */
        }

        .card-label { font-size: 0.8rem; color: #fff; margin-bottom: 5px; display: block; font-weight: bold; text-transform: uppercase;}
        .card-price { 
            display: block; 
            color: var(--success-green); 
            font-size: 1.8rem; 
            font-weight: 800;
            margin: 5px 0;
        }
        .card-task { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; display: block;}

        /* Phone & Main Button (UPDATED) */
        .phone-wrapper { width: 320px; text-align: center; position: relative;}
        .phone-img { width: 100%; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5)); transition: transform 0.3s ease; }
        .phone-wrapper:hover .phone-img {
            transform: scale(1.03); /* Subtle hover zoom */
        }
        
        .btn-join {
            width: 100%;
            background: linear-gradient(to bottom, #ff9800, #f44336);
            color: white;
            padding: 18px;
            font-size: 1.6rem; /* Slightly larger text */
            font-weight: bold;
            border: none;
            border-radius: 10px;
            margin-top: -60px; /* pull button up over image */
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(244, 67, 54, 0.4);
            text-transform: uppercase;
            z-index: 10;
            transition: box-shadow 0.2s, transform 0.1s;
        }
        .btn-join:hover {
            box-shadow: 0 15px 30px rgba(244, 67, 54, 0.5);
        }
        .btn-join:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }

        /* Payout Footer */
        .payout-methods {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #1e2533;
        }
        .payout-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .method-box {
            background: #111827;
            border: 1px solid #1e2533;
            padding: 12px 40px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* Responsive adjustments */
        @media (max-width: 950px) {
            .offers-grid { grid-template-columns: repeat(2, 180px); }
        }
        @media (max-width: 650px) {
            .offers-grid { grid-template-columns: repeat(1, 100%); }
            .phone-wrapper { width: 280px; }
        }
    </style>
</head>
