<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reality Rewards - Professional Final</title>
    <style>
        :root {
            --orange: #ff7a00;
            --green: #00ff85;
            --dark-bg: #0b0f1a;
            --card-bg: #161c2d;
            --input-bg: #0d121f;
            --border: #2a3447;
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .page-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 40px;
            width: 95%;
            max-width: 1400px;
            align-items: center;
        }

        /* رقم 1: تسجيل الدخول الاحترافي */
        .auth-panel {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .auth-panel h2 {
            color: var(--orange);
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #ff8c00, #ff4e00);
            border: none;
            color: white;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* الوسط: محتوى العروض المربع */
        .main-content {
            text-align: center;
        }

        .main-content h1 {
            font-size: 2.5rem;
            font-weight: 900;
        }

        .main-content h1 span { color: var(--green); }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
        }

        .card .reward {
            display: block;
            color: var(--green);
            font-size: 1.8rem;
            font-weight: 800;
        }

        /* رقم 2: الجانب الأيمن للاشتراك */
        .visual-side {
            text-align: center;
        }

        .btn-signup-main {
            width: 100%;
            padding: 20px;
            background: linear-gradient(180deg, #ff9d00, #ff4500);
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.5);
            text-transform: uppercase;
        }

        @media (max-width: 1100px) {
            .page-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="page-grid">
        <div class="auth-panel">
            <h2>Sign In</h2>
            <input type="text" class="input-field" placeholder="Username or Email">
            <input type="password" class="input-field" placeholder="Password">
            <button class="btn-login">Login</button>
        </div>

        <div class="main-content">
            <h1>REALITY REWARDS:<br><span>TURN GAMING INTO CASH!</span></h1>
            <div class="offers-grid">
                <div class="card">
                    <div style="font-size: 0.9rem; font-weight: bold;">MYSTERY GAME</div>
                    <span class="reward">$250</span>
                </div>
                <div class="card">
                    <div style="font-size: 0.9rem; font-weight: bold;">ULTIMATE CHALLENGE</div>
                    <span class="reward">$500</span>
                </div>
            </div>
        </div>

        <div class="visual-side">
            <img src="YOUR_SAFE_IMAGE_URL" style="width:100%; margin-bottom:20px;" alt="Safe">
            <button class="btn-signup-main">Sign Up Now</button>
        </div>
    </div>

</body>
</html>
