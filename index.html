<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2E Rewards - Professional Layout</title>
    <style>
        :root {
            --orange: #ff7a00;
            --green: #00ff85;
            --dark-blue: #0b111d;
            --card-bg: rgba(22, 28, 45, 0.9);
        }

        body {
            margin: 0;
            background-color: var(--dark-blue);
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 95%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            padding: 20px;
            background: radial-gradient(circle at center, #16243d 0%, #0b111d 100%);
            border-radius: 20px;
        }

        /* الجزء الأيسر: العناوين والبطاقات */
        .content-side {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hero-text h1 {
            font-size: 2.5rem;
            margin: 0;
            line-height: 1.1;
        }

        .hero-text span { color: var(--green); }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .offer-card {
            background: var(--card-bg);
            border: 1px solid #2a3447;
            border-radius: 10px;
            padding: 15px 5px;
            text-align: center;
        }

        .offer-card img {
            width: 50px;
            height: 50px;
            margin-bottom: 10px;
        }

        .price {
            display: block;
            color: var(--green);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .requirements {
            font-size: 0.5rem;
            color: #8892b0;
            text-transform: uppercase;
        }

        /* الجزء الأيمن: الهاتف والمال وزر الاشتراك */
        .visual-side {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .phone-money-img {
            width: 100%;
            z-index: 1;
        }

        .signup-btn {
            background: linear-gradient(180deg, #ff9d00 0%, #ff5c00 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 92, 0, 0.4);
            margin-top: -50px; /* لسحب الزر فوق الصورة */
            z-index: 2;
            width: 80%;
            text-transform: uppercase;
        }

        .payout-methods {
            grid-column: span 2;
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #2a3447;
            padding-top: 20px;
        }

        /* لجعل الموقع متجاوب مع الموبايل */
        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            .offers-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="content-side">
            <div class="hero-text">
                <h1>REALITY REWARDS:<br><span>TURN GAMING INTO REAL CASH!</span></h1>
                <p style="font-size: 0.8rem; color: #8892b0;">PLAY TOP MOBILE GAMES & EARN UP TO $500 PER GAME</p>
            </div>

            <div class="offers-grid">
                <div class="offer-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png" alt="icon">
                    <div style="font-size: 0.7rem;">MYSTERY GAME</div>
                    <span class="price">$250</span>
                    <span class="requirements">[INSTALL & LEVEL 10]</span>
                </div>
                <div class="offer-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/1251/1251786.png" alt="icon">
                    <div style="font-size: 0.7rem;">ULTIMATE CHALLENGE</div>
                    <span class="price">$500</span>
                    <span class="requirements">[COMPLETE MISSION]</span>
                </div>
                <div class="offer-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/5334/5334814.png" alt="icon">
                    <div style="font-size: 0.7rem;">SPEED RUN</div>
                    <span class="price">$100</span>
                    <span class="requirements">[REACH TOP 10]</span>
                </div>
            </div>
        </div>

        <div class="visual-side">
            <img src="https://i.ibb.co/mS7S8m4/phone-money-combined.png" class="phone-money-img" alt="Phone and Cash">
            <button class="signup-btn">SIGN UP</button>
        </div>

        <div class="payout-methods">
            <p style="font-size: 0.8rem; color: #8892b0;">PAYOUT METHODS</p>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <span>PAYPAL</span> <span>BITCOIN</span> <span>GIFT CARDS</span>
            </div>
        </div>
    </div>

</body>
</html>
