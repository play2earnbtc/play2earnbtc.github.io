<!DOCTYPE HTML>
<html lang="fr">
<head>
    <title>Play2Earn VIP | Rewards</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0f13; font-family: 'Inter', sans-serif; color: white; padding-top: 130px; }

        /* الهيدر - مطابق للصورة تماماً */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: #16191e; border-bottom: 3px solid #fca311;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 1000;
        }
        .logo-area img { height: 60px; display: block; }
        .stats-left { font-size: 16px; font-weight: 900; color: #ffffff; }
        .stats-left b { color: #fca311; font-size: 20px; margin-left: 5px; }
        .online-status {
            background: rgba(0, 255, 133, 0.15); color: #00ff85;
            padding: 10px 20px; border-radius: 50px; font-weight: 900;
            font-size: 14px; border: 2px solid #00ff85; display: flex; align-items: center; margin-right: 20px;
        }
        .pulse { height: 10px; width: 10px; background: #00ff85; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px #00ff85; }

        /* شريط السحوبات */
        .payouts-bar {
            position: fixed; top: 90px; left: 0; width: 100%; height: 45px;
            background: #1c2128; border-bottom: 1px solid #2d333b;
            display: flex; align-items: center; overflow: hidden; z-index: 999;
        }
        .ticker { display: flex; animation: slide 25s linear infinite; }
        .ticker-item { margin-right: 80px; font-weight: 900; font-size: 15px; color: #fff; white-space: nowrap; }
        .ticker-item span { color: #00ff85; }
        @keyframes slide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الحاويات والشبكة */
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4 مربعات في الصف */
            gap: 20px; 
            margin-bottom: 40px;
        }
        .card { background: #16191e; border-radius: 15px; border: 2px solid #2d333b; padding: 20px; text-align: center; }
        .card:hover { border-color: #00ff85; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; background: #222; }
        .card .reward-text { color: #00ff85; font-size: 14px; font-weight: 700; display: block; margin-bottom: 5px; }
        .card h3 { font-size: 16px; margin-bottom: 15px; color: #fff; height: 40px; overflow: hidden; }
        .btn { background: #00ff85; color: #000; text-decoration: none; padding: 12px 0; display: block; border-radius: 10px; font-weight: 900; text-transform: uppercase; font-size: 14px; }

        /* مستطيلات الإعلانات */
        .ad-banner {
            width: 100%;
            height: 120px;
            background: #1a1d23;
            border: 2px dashed #3d444d;
            margin: 40px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            color: #5d6671;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        /* للهواتف: يتحول لـ مربعين في الصف */
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area"><img src="images/logo-removebg-preview.png"></div>
        <div class="stats-left">EST. 2017 | TOTAL PAID: <b>$3,510,240</b></div>
        <div class="online-status"><span class="pulse"></span> 3,124 PLAYERS ONLINE</div>
    </header>

    <div class="payouts-bar">
        <div class="ticker">
            <div class="ticker-item">USER_2291: <span>$25.00 PAYPAL</span></div>
            <div class="ticker-item">ARBI_XX: <span>$14.20 LTC</span></div>
            <div class="ticker-item">KING_GAMER: <span>$50.00 VISA</span></div>
            <div class="ticker-item">MOMO_EARN: <span>$10.00 PAYPAL</span></div>
        </div>
    </div>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 40px; font-weight: 900;">SELECT A GAME TO CLAIM YOUR REWARD</h2>

        <div class="grid">
            <script>
                for(let i=1; i<=8; i++) {
                    document.write(`
                        <div class="card">
                            <img src="images/${i}.png">
                            <span class="reward-text">Earn up to $25.00</span>
                            <h3>Game Offer Reward #${i}</h3>
                            <a href="#" class="btn">JOUER ET GAGNE</a>
                        </div>
                    `);
                }
            </script>
        </div>

        <div class="ad-banner">ADS SPACE #1 - BANNER 728x90</div>

        <div class="grid">
            <script>
                for(let i=9; i<=16; i++) {
                    document.write(`
                        <div class="card">
                            <img src="images/${i}.png">
                            <span class="reward-text">Earn up to $30.00</span>
                            <h3>Game Offer Reward #${i}</h3>
                            <a href="#" class="btn">JOUER ET GAGNE</a>
                        </div>
                    `);
                }
            </script>
        </div>

        <div class="ad-banner">ADS SPACE #2 - BANNER 728x90</div>

        <div class="grid">
            <script>
                for(let i=17; i<=20; i++) {
                    document.write(`
                        <div class="card">
                            <img src="images/${i}.png">
                            <span class="reward-text">Earn up to $45.00</span>
                            <h3>Game Offer Reward #${i}</h3>
                            <a href="#" class="btn">JOUER ET GAGNE</a>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

</body>
</html>
