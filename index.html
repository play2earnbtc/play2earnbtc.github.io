<!DOCTYPE HTML>
<html lang="fr">
<head>
    <title>Play2Earn VIP | Secure Access</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0f13; font-family: 'Arial', sans-serif; color: white; padding-top: 140px; }

        /* الهيدر مع إضافة حماية SSL */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: #16191e; border-bottom: 3px solid #2d333b;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 1000;
        }

        /* لوغو سوبير ماريو النصي */
        .mario-logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            display: flex;
            gap: 4px;
            cursor: pointer;
        }
        .mario-logo span:nth-child(odd) { color: #ff0000; text-shadow: 2px 2px #000; }
        .mario-logo span:nth-child(even) { color: #eec900; text-shadow: 2px 2px #000; }
        .mario-logo .green { color: #00ff00 !important; }
        .mario-logo .blue { color: #0000ff !important; }
        .mario-logo .vip-tag { color: #00ff85 !important; margin-left: 10px; }

        /* أيقونة SSL */
        .ssl-status {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0, 255, 133, 0.1);
            padding: 8px 15px; border-radius: 8px;
            border: 1px solid #00ff85; color: #00ff85;
            font-size: 12px; font-weight: bold;
        }

        .stats-right { text-align: right; }
        .online-count { color: #00ff85; font-size: 11px; margin-top: 5px; }

        /* المحتوى الممنوع لمسه (الألعاب والسحوبات) */
        .ticker { position: fixed; top: 90px; left: 0; width: 100%; background: #1c2128; height: 35px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid #2d333b; }
        .ticker-wrap { display: flex; animation: scroll 30s linear infinite; }
        .ticker-item { margin-right: 50px; font-size: 12px; font-weight: bold; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .main-content { max-width: 1300px; margin: 0 auto; padding: 20px; }
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .game-card { background: #1a1d23; border: 2px solid #2d333b; border-radius: 12px; padding: 15px; text-align: center; }
        .game-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .play-button { background: #00ff85; color: #000; padding: 12px; display: block; text-decoration: none; border-radius: 8px; font-weight: 900; }
    </style>
</head>

            <span class="vip-tag">VIP</span>

            <div class="online-count"><i class="fas fa-circle"></i> 3,124 PLAYERS ONLINE</div>
        </div>
    </header>
