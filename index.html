<!DOCTYPE HTML>
<html lang="fr">
<head>
    <title>Play2Earn VIP | Super Mario Style</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0f13; font-family: 'Arial', sans-serif; color: white; padding-top: 140px; }

        /* تنسيق الهيدر */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: #16191e; border-bottom: 3px solid #2d333b;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 1000;
        }

        /* ستايل اسم الموقع (سوبر ماريو) */
        .mario-style {
            font-family: 'Press+Start+2P', cursive; /* خط الألعاب */
            font-size: 20px;
            display: flex;
            gap: 5px;
            text-transform: uppercase;
        }
        /* تلوين الحروف بستايل ماريو */
        .mario-style span:nth-child(1) { color: #ff0000; text-shadow: 2px 2px #000; } /* P - أحمر */
        .mario-style span:nth-child(2) { color: #eec900; text-shadow: 2px 2px #000; } /* L - أصفر */
        .mario-style span:nth-child(3) { color: #00ff00; text-shadow: 2px 2px #000; } /* A - أخضر */
        .mario-style span:nth-child(4) { color: #0000ff; text-shadow: 2px 2px #000; } /* Y - أزرق */
        .mario-style span.num { color: #ffffff; text-shadow: 2px 2px #ff0000; }        /* 2 - أبيض */
        .mario-style span.vip { color: #00ff85; text-shadow: 2px 2px #000; margin-left: 10px; } /* VIP - أخضر فوسفوري */

        .stats-right { text-align: right; }
        .online-badge { color: #00ff85; font-size: 11px; font-weight: 900; border: 1px solid #00ff85; padding: 5px 10px; border-radius: 5px; }

        /* شريط السحوبات */
        .ticker { position: fixed; top: 90px; left: 0; width: 100%; background: #1c2128; height: 35px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid #2d333b; }
        .ticker-move { display: flex; animation: move 30s linear infinite; white-space: nowrap; }
        .ticker-item { margin-right: 50px; font-size: 12px; font-weight: bold; }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الألعاب */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .card { background: #1a1d23; border: 2px solid #2d333b; border-radius: 10px; padding: 15px; text-align: center; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .btn { background: #00ff85; color: #000; padding: 10px; display: block; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }

        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="mario-style">
            <span>P</span><span>L</span><span>A</span><span>Y</span><span class="num">2</span><span>E</span><span>A</span><span>R</span><span>N</span>
            <span class="vip">VIP</span>
        </div>
        <div class="stats-right">
            <div style="font-size: 12px; margin-bottom: 5px;">Total Paid: <b style="color: #eec900;">$3,510,240</b></div>
            <div class="online-badge">3,124 PLAYERS ONLINE</div>
        </div>
    </header>

    <div class="ticker">
        <div class="ticker-move">
            <div class="ticker-item">USER_X1: <span style="color:#00ff85">$25.00</span></div>
            <div class="ticker-item">MARIO_WIN: <span style="color:#00ff85">$50.00</span></div>
            <div class="ticker-item">BOOS_UP: <span style="color:#00ff85">$15.00</span></div>
        </div>
    </div>

    <div class="container">
        <div class="grid">
            <script>
                for(let i=1; i<=24; i++) {
                    document.write(`
                        <div class="card">
                            <img src="1.png" onerror="this.src='https://via.placeholder.com/150'">
                            <div style="font-size: 12px; color: #00ff85;">Win $500</div>
                            <h3 style="font-size: 14px; margin: 10px 0;">Game Mission #${i}</h3>
                            <a href="#" class="btn">JOUER ET GAGNE</a>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

</body>
</html>
