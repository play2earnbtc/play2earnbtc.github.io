        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0f13; font-family: 'Arial', sans-serif; color: white; padding-top: 150px; }

        .reward-tag { color: #00ff85; font-weight: bold; display: block; margin: 10px 0; }
        .play-btn { background: #00ff85; color: #000; text-decoration: none; display: block; padding: 12px; border-radius: 8px; font-weight: 900; }
        .ads-banner { grid-column: span 4; background: #1a1d23; border: 2px dashed #3d444d; min-height: 90px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
    </style>
