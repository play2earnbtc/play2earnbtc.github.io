<!DOCTYPE HTML>
<html>
<head>
    <title>Play2Earn VIP | Real Rewards</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { background: #0f1115; font-family: 'Inter', sans-serif; padding-top: 110px !important; }

        /* الشريط العلوي */
        #top-nav {
            background: #1a1d23; height: 70px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 30px; border-bottom: 1px solid #2d333b;
            position: fixed; top: 0; width: 100%; z-index: 10001;
        }
        .nav-logo { height: 45px; }
        .nav-left { display: flex; align-items: center; }
        .site-stats { margin-left: 20px; color: #5d6671; font-size: 13px; }
        .stats-highlight { color: #fca311; font-weight: 900; font-size: 1.1rem; }

        /* المحتوى الفعلي - المربعات */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .offer-card {
            background: #1a1d23;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2d333b;
            transition: transform 0.2s;
        }
        .offer-card:hover { transform: translateY(-5px); border-color: #00ff85; }
        .offer-image { width: 100%; height: 180px; object-fit: cover; background: #252930; }
        .offer-details { padding: 15px; text-align: center; }
        .offer-title { color: #fff; font-weight: 700; margin-bottom: 10px; font-size: 1rem; }
        .offer-btn {
            background: #00ff85;
            color: #000;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 6px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
        }
        .reward-tag { color: #00ff85; font-size: 12px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <nav id="top-nav">
        <div class="nav-left">
            <img src="images/logo-removebg-preview.png" alt="Logo" class="nav-logo">
            <div class="site-stats">
                EST. 2017 | TOTAL PAID: <span class="stats-highlight">$3,510,240</span>
            </div>
        </div>
        <div class="nav-right">
            <div style="background: rgba(0,255,133,0.1); color: #00ff85; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold;">
                <i class="fa fa-circle" style="font-size: 8px; vertical-align: middle;"></i> 3,124 ONLINE
            </div>
        </div>
    </nav>

    <div id="main-content">
        <h2 style="text-align: center; color: #fff; margin-bottom: 30px; font-weight: 900;">SELECT A GAME TO CLAIM YOUR REWARD</h2>
        
        <div class="offers-grid">
            <div class="offer-card">
                <img src="images/1.png" class="offer-image">
                <div class="offer-details">
                    <span class="reward-tag">Earn up to $23.22</span>
                    <div class="offer-title">Merge Help-Warm Family</div>
                    <a href="#" class="offer-btn">Jouer et gagne</a>
                </div>
            </div>

            <div class="offer-card">
                <img src="images/2.png" class="offer-image">
                <div class="offer-details">
                    <span class="reward-tag">Earn up to $45.00</span>
                    <div class="offer-title">Monopoly Go!</div>
                    <a href="#" class="offer-btn">Jouer et gagne</a>
                </div>
            </div>

            <div class="offer-card">
                <img src="images/3.png" class="offer-image">
                <div class="offer-details">
                    <span class="reward-tag">Earn up to $12.50</span>
                    <div class="offer-title">Triple Tile Match</div>
                    <a href="#" class="offer-btn">Jouer et gagne</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
